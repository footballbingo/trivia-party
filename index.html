<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Trivia Party" />
<title>Trivia Party</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="assets/app-icon.png" />
<link rel="apple-touch-icon" href="assets/app-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0b1020;--card:#1c2545;--line:#2a3663;--text:#eef1ff;--muted:#8b94c0;--accent:#ffd23f;--accent2:#ff8a3d;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{font-family:'Montserrat',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1000px 700px at 50% -10%,#1b2547 0%,var(--bg) 55%);
    color:var(--text);min-height:100dvh;display:flex;justify-content:center;padding:26px 18px 24px;}
  .wrap{width:100%;max-width:480px;display:flex;flex-direction:column;}

  /* Header */
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:26px;}
  .brand img{width:74px;height:74px;border-radius:20px;box-shadow:0 10px 28px rgba(0,0,0,.5);margin-bottom:12px;}
  .brand h1{margin:0;font-size:15px;letter-spacing:.34em;font-weight:800;color:var(--accent);text-transform:uppercase;}
  .brand p{margin:8px 0 0;font-size:15px;color:var(--muted);max-width:280px;}

  .sect{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 4px 12px;}

  /* Game cards */
  .cards{display:flex;flex-direction:column;gap:14px;}
  .card{position:relative;display:block;text-decoration:none;color:var(--text);border-radius:20px;overflow:hidden;
    border:1.5px solid var(--line);min-height:150px;padding:20px;display:flex;flex-direction:column;justify-content:flex-end;
    transition:transform .1s ease, border-color .2s;background-size:cover;background-position:center;}
  .card:active{transform:scale(.98);}
  .card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,16,32,.35) 0%,rgba(11,16,32,.9) 100%);}
  .card>*{position:relative;z-index:1;}
  .card .tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--accent);margin-bottom:6px;}
  .card h2{margin:0;font-size:27px;font-weight:900;letter-spacing:-.01em;}
  .card .sub{margin:5px 0 0;font-size:13.5px;color:#c8cff0;}
  .card .go{position:absolute;top:18px;right:18px;z-index:1;width:38px;height:38px;border-radius:50%;
    background:linear-gradient(180deg,var(--accent),var(--accent2));color:#20160a;display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:900;box-shadow:0 6px 16px rgba(255,138,61,.4);}

  .bingo{background-image:url('assets/bg-bingo.png');}
  .hilo{background-image:url('assets/bg-higherlower.png');}

  .soon{margin-top:14px;border:1.5px dashed var(--line);border-radius:18px;padding:18px;text-align:center;color:var(--muted);
    font-size:13.5px;font-weight:600;}
  .soon b{color:#c8cff0;}
  .foot{margin-top:auto;padding-top:22px;text-align:center;font-size:11px;color:#59628f;}

  /* Install hint */
  #install{display:none;margin-top:14px;width:100%;border:none;cursor:pointer;border-radius:16px;padding:14px;
    font-family:inherit;font-size:15px;font-weight:800;color:#20160a;background:linear-gradient(180deg,var(--accent),var(--accent2));
    box-shadow:0 8px 22px rgba(255,138,61,.3);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="assets/app-icon.png" alt="Trivia Party" />
      <h1>Trivia Party</h1>
      <p>Play with friends. Football &amp; general knowledge.</p>
    </div>

    <div class="sect">Games</div>
    <div class="cards">
      <a class="card bingo" href="football-bingo.html">
        <div class="go">▶</div>
        <div class="tag">⚽ Football</div>
        <h2>Football Bingo</h2>
        <p class="sub">Ball-knowledge bingo · Casual &amp; Expert</p>
      </a>
      <a class="card hilo" href="higher-or-lower.html">
        <div class="go">▶</div>
        <div class="tag">🌍 General Knowledge</div>
        <h2>Higher or Lower</h2>
        <p class="sub">90-second population blitz</p>
      </a>
    </div>

    <div class="soon">🔒 <b>More games coming soon</b><br/>Marked Man · live multiplayer with friends</div>

    <button id="install">⬇ &nbsp;Install app to home screen</button>

    <div class="foot">Trivia Party · prototype</div>
  </div>

<script>
  // PWA service worker
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
  // Install prompt
  let deferred;
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; document.getElementById('install').style.display='block'; });
  document.getElementById('install').addEventListener('click', async ()=>{
    if(!deferred) return; deferred.prompt(); await deferred.userChoice; deferred=null;
    document.getElementById('install').style.display='none';
  });
</script>
</body>
</html>
